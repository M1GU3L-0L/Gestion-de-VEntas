<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Sistema de Ventas</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body class="login-page">

    <div class="login-container">

        <div class="login-box">

            <h1>Sistema de Ventas</h1>
            <h2>Iniciar Sesión</h2>

            <form id="loginForm">

                <!-- EMAIL -->
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" required>
                </div>

                <!-- PASSWORD -->
                <div class="form-group">
                    <label for="password">Contraseña</label>

                    <div class="password-wrapper">
                        <input type="password" id="password" required>

                        <button type="button" id="togglePassword" class="toggle-password">
                            Ver
                        </button>
                    </div>
                </div>

                <!-- RECORDARME -->
                <div class="remember-container">
                    <label class="remember-label">
                        <input type="checkbox" id="rememberMe">
                        <span>Recordarme</span>
                    </label>
                </div>

                <!-- BOTÓN -->
                <button type="submit" class="btn-primary">
                    Iniciar sesión
                </button>

                <!-- LINKS -->
                <div class="links">
                    <a href="#" id="forgotPasswordLink">¿Olvidó su contraseña?</a>
                    <a href="register.html">Crear cuenta nueva</a>
                </div>

            </form>

            <div id="message" class="message"></div>

        </div>

    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>

    <script>

        // 🔐 SI YA ESTÁ LOGUEADO
        if (isAuthenticated()) {
            window.location.href = 'dashboard.html';
        }

        // 🔄 CARGAR DATOS GUARDADOS
        window.addEventListener('DOMContentLoaded', () => {

            const email = localStorage.getItem('rememberEmail');
            const password = localStorage.getItem('rememberPassword');

            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const rememberMe = document.getElementById('rememberMe');

            if (email) emailInput.value = email;

            if (password) {
                passwordInput.value = password;
                rememberMe.checked = true;
            }

        });

        // 👁 TOGGLE PASSWORD SIN EMOJIS
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', () => {

            const isPassword = passwordInput.type === 'password';

            passwordInput.type = isPassword ? 'text' : 'password';

            togglePassword.textContent = isPassword ? 'Ocultar' : 'Ver';

        });

        // 🔑 LOGIN
        document.getElementById('loginForm').addEventListener('submit', async (e) => {

            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            const messageDiv = document.getElementById('message');
            const submitBtn = document.querySelector('.btn-primary');

            try {

                submitBtn.disabled = true;
                submitBtn.textContent = 'Ingresando...';

                if (rememberMe) {
                    localStorage.setItem('rememberEmail', email);
                    localStorage.setItem('rememberPassword', password);
                } else {
                    localStorage.removeItem('rememberEmail');
                    localStorage.removeItem('rememberPassword');
                }

                const response = await loginUser(email, password);

                if (response.success) {

                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✔ ' + response.message;

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                }

            } catch (error) {

                messageDiv.className = 'message error';
                messageDiv.textContent = '✖ ' + error.message;

            } finally {

                submitBtn.disabled = false;
                submitBtn.textContent = 'Iniciar sesión';
            }

        });

        // 🔄 RECUPERAR CONTRASEÑA
        document.getElementById('forgotPasswordLink').addEventListener('click', async (e) => {

            e.preventDefault();

            const email = prompt('Ingrese su correo electrónico:');

            if (email) {
                try {
                    const response = await forgotPassword(email);
                    alert('✔ ' + response.message);
                } catch (error) {
                    alert('✖ ' + error.message);
                }
            }

        });

    </script>

</body>

</html>
