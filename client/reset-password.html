<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Sistema de Gestión de Ventas</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>🛒 Sistema de Ventas</h1>
            <h2>Restablecer Contraseña</h2>
            
            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="password">Nueva Contraseña</label>
                    <input type="password" id="password" name="password" required minlength="6">
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirmar Nueva Contraseña</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>
                
                <button type="submit" class="btn-primary">Restablecer Contraseña</button>
                
                <div class="links">
                    <a href="index.html">Volver al login</a>
                </div>
            </form>
            
            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        // Obtener token de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('message').textContent = '❌ Token inválido o no proporcionado';
            document.getElementById('message').className = 'message error';
            document.getElementById('resetPasswordForm').style.display = 'none';
        }

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            
            // Validar que las contraseñas coincidan
            if (password !== confirmPassword) {
                messageDiv.textContent = '❌ Las contraseñas no coinciden';
                messageDiv.className = 'message error';
                return;
            }
            
            try {
                messageDiv.textContent = 'Restableciendo contraseña...';
                messageDiv.className = 'message info';
                
                const response = await resetPassword(token, password);
                
                if (response.success) {
                    messageDiv.textContent = '✅ Contraseña restablecida exitosamente';
                    messageDiv.className = 'message success';
                    
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 2000);
                }
            } catch (error) {
                messageDiv.textContent = '❌ ' + error.message;
                messageDiv.className = 'message error';
            }
        });
    </script>
</body>
</html>
